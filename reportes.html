<!DOCTYPE html>
<html>
<head>
    <title>Reportes</title>
</head>
<body>

<h1>📊 Reporte de Ventas</h1>

<table border="1">
<tr>
    <th>Producto</th>
    <th>Cantidad</th>
    <th>Total</th>
</tr>

{% for d in data %}
<tr>
    <td>{{d[0]}}</td>
    <td>{{d[1]}}</td>
    <td>${{d[2]}}</td>
</tr>
{% endfor %}

</table>

</body>
</html>
